# Strategy parameters
strategy:
  confidence_threshold: 0.50      # Minimum confidence to enter trade
  stop_loss_pct: 0.0025          # 0.25% stop loss
  target_pct: 0.007              # 0.70% target profit
  max_hold_minutes: 45           # Time exit after 45 minutes
  position_sizing: "fixed_fraction"  # Options: fixed_fraction, kelly
  risk_per_trade_pct: 0.02       # 2% risk per trade

# Risk management
risk:
  max_daily_loss: 2000           # Stop trading after losing ₹2000 in a day
  max_drawdown_pct: 0.10         # 10% max drawdown from peak
  max_position_value: 100000     # Max capital per trade
  max_concurrent_trades: 3

# Data
data:
  features_path: "data/processed/features.csv"
  model_predictions_path: "results/model_predictions.csv"
  trades_db: "trade_logs/trading.db"

# Logging
logging:
  level: "INFO"
  file: "logs/trading.log"
  max_bytes: 10485760   # 10 MB
  backup_count: 5

# Alerts
alerts:
  telegram_bot_token: "YOUR_BOT_TOKEN"
  telegram_chat_id: "YOUR_CHAT_ID"
  enable_slack: false
  slack_webhook: ""